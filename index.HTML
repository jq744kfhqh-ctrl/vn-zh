<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中越翻译助手 · DeepSeek</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --jade-dark: #1a3a2a;
            --jade: #2d6a4f;
            --jade-light: #40916c;
            --jade-pale: #b7e4c7;
            --jade-cream: #d8f3dc;
            --gold: #d4a843;
            --gold-light: #f0d78c;
            --gold-dark: #b8860b;
            --bg: #f4f7f5;
            --card: #ffffff;
            --text: #1a1a2e;
            --text-muted: #6b7280;
            --border: #e5e7eb;
            --shadow: 0 4px 24px rgba(45, 106, 79, 0.08);
            --shadow-lg: 0 8px 40px rgba(45, 106, 79, 0.12);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', 'Noto Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%;
            right: -30%;
            width: 80vw;
            height: 80vw;
            background: radial-gradient(circle, rgba(45,106,79,0.04) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -40%;
            left: -20%;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, rgba(212,168,67,0.04) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, var(--jade-dark) 0%, var(--jade) 50%, var(--jade-light) 100%);
            color: white;
            padding: 0;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(26, 58, 42, 0.15);
        }

        .header-inner {
            max-width: 1400px;
            margin: 0 auto;
            padding: 14px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--gold), var(--gold-light));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: var(--jade-dark);
            box-shadow: 0 2px 10px rgba(212,168,67,0.3);
        }

        .logo-text h1 {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .logo-text p {
            font-size: 11px;
            opacity: 0.8;
            font-weight: 300;
        }

        .header-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 13px;
            font-family: inherit;
            font-weight: 500;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-ghost {
            background: rgba(255,255,255,0.15);
            color: white;
            backdrop-filter: blur(4px);
        }

        .btn-ghost:hover {
            background: rgba(255,255,255,0.25);
        }

        /* Main Layout */
        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 20px;
            position: relative;
            z-index: 1;
        }

        /* Chat Panel */
        .chat-panel {
            background: var(--card);
            border-radius: 16px;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            height: calc(100vh - 90px);
        }

        .chat-header {
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(to right, var(--jade-cream), white);
        }

        .chat-header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chat-header-left i {
            color: var(--jade);
            font-size: 18px;
        }

        .chat-header-left h2 {
            font-size: 15px;
            font-weight: 600;
            color: var(--jade-dark);
        }

        .chat-header-left span {
            font-size: 12px;
            color: var(--text-muted);
        }

        .msg-count {
            background: var(--jade);
            color: white;
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: 500;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: var(--jade-pale);
            border-radius: 3px;
        }

        /* Message bubbles */
        .message {
            display: flex;
            gap: 10px;
            max-width: 80%;
            animation: fadeInUp 0.3s ease;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.customer {
            align-self: flex-start;
        }

        .message.merchant {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .msg-avatar {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }

        .customer .msg-avatar {
            background: linear-gradient(135deg, #ff6b6b, #ffa07a);
            color: white;
        }

        .merchant .msg-avatar {
            background: linear-gradient(135deg, var(--jade), var(--jade-light));
            color: white;
        }

        .msg-content {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .msg-bubble {
            padding: 12px 16px;
            border-radius: 14px;
            font-size: 14px;
            line-height: 1.6;
        }

        .customer .msg-bubble {
            background: #f0f0f0;
            color: var(--text);
            border-bottom-left-radius: 4px;
        }

        .merchant .msg-bubble {
            background: linear-gradient(135deg, var(--jade), var(--jade-light));
            color: white;
            border-bottom-right-radius: 4px;
        }

        .msg-translation {
            font-size: 12px;
            padding: 8px 12px;
            border-radius: 8px;
            display: flex;
            align-items: flex-start;
            gap: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .msg-translation:hover {
            transform: translateX(2px);
        }

        .customer .msg-translation {
            background: #fff8e1;
            border-left: 3px solid var(--gold);
            color: var(--text);
        }

        .merchant .msg-translation {
            background: #e8f5e9;
            border-left: 3px solid var(--jade-light);
            color: var(--text);
        }

        .msg-translation i {
            font-size: 10px;
            margin-top: 3px;
            flex-shrink: 0;
        }

        .msg-time {
            font-size: 11px;
            color: var(--text-muted);
            padding: 0 4px;
        }

        .merchant .msg-time {
            text-align: right;
        }

        /* Input Area */
        .chat-input-area {
            padding: 14px 20px;
            border-top: 1px solid var(--border);
            background: white;
        }

        .input-role-toggle {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }

        .role-btn {
            padding: 6px 14px;
            border-radius: 20px;
            border: 1.5px solid var(--border);
            background: white;
            cursor: pointer;
            font-size: 12px;
            font-family: inherit;
            font-weight: 500;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .role-btn.active {
            border-color: var(--jade);
            background: var(--jade-cream);
            color: var(--jade-dark);
        }

        .role-btn.customer.active {
            border-color: #ff6b6b;
            background: #fff0f0;
            color: #c0392b;
        }

        .input-row {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .input-wrapper {
            flex: 1;
        }

        .input-wrapper textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid var(--border);
            border-radius: 12px;
            font-size: 14px;
            font-family: inherit;
            resize: none;
            outline: none;
            transition: border-color 0.2s;
            background: #fafbfc;
            min-height: 44px;
            max-height: 120px;
            line-height: 1.5;
        }

        .input-wrapper textarea:focus {
            border-color: var(--jade-light);
            background: white;
        }

        .input-wrapper textarea::placeholder {
            color: #b0b0b0;
        }

        .send-btn {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, var(--jade), var(--jade-light));
            color: white;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .send-btn:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(45, 106, 79, 0.3);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Right Panel */
        .right-panel {
            display: flex;
            flex-direction: column;
            gap: 16px;
            height: calc(100vh - 90px);
        }

        .panel-card {
            background: var(--card);
            border-radius: 14px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .panel-card-header {
            padding: 14px 18px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 600;
            color: var(--jade-dark);
        }

        .panel-card-header i {
            color: var(--gold);
        }

        .panel-card-body {
            padding: 16px 18px;
        }

        /* Quick Translate */
        .quick-translate {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .qt-direction {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .qt-select {
            flex: 1;
            padding: 8px 12px;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            font-size: 13px;
            font-family: inherit;
            outline: none;
            background: white;
        }

        .qt-swap {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 1.5px solid var(--border);
            background: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--jade);
            font-size: 12px;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .qt-swap:hover {
            background: var(--jade-cream);
            border-color: var(--jade-light);
        }

        .qt-input, .qt-output {
            padding: 12px;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            font-size: 13px;
            font-family: inherit;
            outline: none;
            resize: none;
            min-height: 100px;
            line-height: 1.6;
            width: 100%;
        }

        .qt-input {
            background: #fafbfc;
        }

        .qt-input:focus {
            border-color: var(--jade-light);
            background: white;
        }

        .qt-output {
            background: var(--jade-cream);
            border-color: var(--jade-pale);
            color: var(--jade-dark);
            font-weight: 500;
        }

        .qt-btn {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--jade), var(--jade-light));
            color: white;
            font-size: 13px;
            font-family: inherit;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .qt-btn:hover:not(:disabled) {
            box-shadow: 0 4px 12px rgba(45, 106, 79, 0.3);
        }

        .qt-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .qt-history {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .qt-history::-webkit-scrollbar {
            width: 4px;
        }

        .qt-history::-webkit-scrollbar-thumb {
            background: var(--jade-pale);
            border-radius: 2px;
        }

        .history-item {
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 12px;
            line-height: 1.5;
            cursor: pointer;
            transition: all 0.2s;
        }

        .history-item:hover {
            border-color: var(--jade-light);
            background: var(--jade-cream);
        }

        .history-item .h-from {
            color: var(--text);
            margin-bottom: 4px;
            word-break: break-word;
        }

        .history-item .h-to {
            color: var(--jade-dark);
            font-weight: 500;
            word-break: break-word;
        }

        .history-item .h-direction {
            font-size: 10px;
            color: var(--text-muted);
            margin-bottom: 2px;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--jade-dark);
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
            z-index: 1000;
            transition: transform 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: var(--shadow-lg);
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        /* Empty state */
        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            gap: 12px;
            padding: 40px;
        }

        .empty-state i {
            font-size: 48px;
            color: var(--jade-pale);
        }

        .empty-state h3 {
            font-size: 16px;
            color: var(--text);
            font-weight: 600;
        }

        .empty-state p {
            font-size: 13px;
            text-align: center;
            line-height: 1.6;
        }

        /* Typing indicator */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 8px 0;
        }

        .typing-indicator span {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--jade-pale);
            animation: typing 1.2s infinite;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-6px); opacity: 1; }
        }

        /* Responsive */
        @media (max-width: 900px) {
            .main-container {
                grid-template-columns: 1fr;
            }
            .right-panel {
                height: auto;
            }
            .chat-panel {
                height: 60vh;
            }
        }

        .api-status {
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 4px;
            font-weight: 500;
        }

        .api-status.connected {
            background: rgba(255,255,255,0.2);
            color: #d4edda;
        }
    </style>
</head>
<body>

<!-- Header -->
<header class="header">
    <div class="header-inner">
        <div class="logo">
            <div class="logo-icon">💎</div>
            <div class="logo-text">
                <h1>中越翻译助手</h1>
                <p>Powered by DeepSeek · v3</p>
            </div>
        </div>
        <div class="header-actions">
            <span class="api-status connected" id="apiStatus">
                <i class="fas fa-circle" style="font-size:6px;vertical-align:middle"></i> DeepSeek 已连接
            </span>
            <button class="btn btn-ghost" onclick="clearChat()">
                <i class="fas fa-broom"></i> 清空
            </button>
        </div>
    </div>
</header>

<!-- Main Content -->
<div class="main-container">
    <!-- Chat Panel -->
    <div class="chat-panel">
        <div class="chat-header">
            <div class="chat-header-left">
                <i class="fas fa-comments"></i>
                <div>
                    <h2>对话翻译</h2>
                    <span>粘贴对话内容，自动翻译</span>
                </div>
            </div>
            <span class="msg-count" id="msgCount">0 条消息</span>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="empty-state" id="emptyState">
                <i class="fas fa-language"></i>
                <h3>开始对话翻译</h3>
                <p>选择角色后输入内容，发送即可自动翻译<br>客户消息翻译为中文，你的回复翻译为越南语</p>
            </div>
        </div>

        <div class="chat-input-area">
            <div class="input-role-toggle">
                <button class="role-btn customer active" id="roleCustomer" onclick="setRole('customer')">
                    <i class="fas fa-user"></i> 客户消息 (越南语)
                </button>
                <button class="role-btn merchant" id="roleMerchant" onclick="setRole('merchant')">
                    <i class="fas fa-store"></i> 我的回复 (中文)
                </button>
            </div>
            <div class="input-row">
                <div class="input-wrapper">
                    <textarea id="msgInput" placeholder="粘贴客户发来的越南语消息..." rows="1" oninput="autoResize(this)" onkeydown="handleKeyDown(event)"></textarea>
                </div>
                <button class="send-btn" onclick="sendMessage()" id="sendBtn">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Right Panel -->
    <div class="right-panel">
        <!-- Quick Translate -->
        <div class="panel-card">
            <div class="panel-card-header">
                <i class="fas fa-exchange-alt"></i> 快速翻译
            </div>
            <div class="panel-card-body">
                <div class="quick-translate">
                    <div class="qt-direction">
                        <select class="qt-select" id="qtFrom">
                            <option value="vi">🇻🇳 越南语</option>
                            <option value="zh">🇨🇳 中文</option>
                        </select>
                        <button class="qt-swap" onclick="swapQTDirection()">
                            <i class="fas fa-exchange-alt"></i>
                        </button>
                        <select class="qt-select" id="qtTo">
                            <option value="zh">🇨🇳 中文</option>
                            <option value="vi">🇻🇳 越南语</option>
                        </select>
                    </div>
                    <textarea class="qt-input" id="qtInput" placeholder="输入要翻译的文本..." oninput="autoResize(this)"></textarea>
                    <textarea class="qt-output" id="qtOutput" placeholder="翻译结果显示在这里..." readonly></textarea>
                    <button class="qt-btn" onclick="quickTranslate()" id="qtBtn">
                        <i class="fas fa-magic"></i> 翻译
                    </button>
                </div>
            </div>
        </div>

        <!-- Translation History -->
        <div class="panel-card" style="flex:1;display:flex;flex-direction:column;min-height:0">
            <div class="panel-card-header">
                <i class="fas fa-history"></i> 翻译记录
                <button class="btn btn-ghost" style="margin-left:auto;padding:4px 10px;font-size:11px" onclick="clearHistory()">
                    <i class="fas fa-trash"></i> 清空
                </button>
            </div>
            <div class="panel-card-body" style="flex:1;overflow-y:auto;padding:12px 14px">
                <div class="qt-history" id="qtHistory">
                    <div style="text-align:center;color:var(--text-muted);font-size:12px;padding:20px 0">
                        暂无翻译记录
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Toast -->
<div class="toast" id="toast">
    <i class="fas fa-check-circle"></i>
    <span id="toastText"></span>
</div>

<script>
// ==================== DeepSeek API Configuration (内置) ====================
const AI_CONFIG = {
    apiKey: 'sk-801a9545794c477ea2ec417b7114f87d',
    baseUrl: 'https://api.deepseek.com/v1',
    model: 'deepseek-chat'
};

// ==================== State ====================
let messages = [];
let currentRole = 'customer';
let isProcessing = false;
let quickHistory = [];

// Load quick history
try {
    const saved = localStorage.getItem('vnzh_deepseek_v3_qt_history');
    if (saved) quickHistory = JSON.parse(saved);
} catch(e) {}

// ==================== Initialize ====================
function init() {
    updatePlaceholder();
    updateMsgCount();
    renderHistory();
}

// ==================== Role Toggle ====================
function setRole(role) {
    currentRole = role;
    document.getElementById('roleCustomer').classList.toggle('active', role === 'customer');
    document.getElementById('roleMerchant').classList.toggle('active', role === 'merchant');
    updatePlaceholder();
}

function updatePlaceholder() {
    const input = document.getElementById('msgInput');
    if (currentRole === 'customer') {
        input.placeholder = '粘贴客户发来的越南语消息...';
    } else {
        input.placeholder = '输入你的中文回复...';
    }
}

// ==================== Send Message ====================
async function sendMessage() {
    const input = document.getElementById('msgInput');
    const text = input.value.trim();
    if (!text || isProcessing) return;

    isProcessing = true;
    updateSendBtnState();

    input.value = '';
    autoResize(input);

    const msg = {
        id: Date.now(),
        role: currentRole,
        text: text,
        translation: '',
        time: new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' })
    };

    messages.push(msg);
    renderMessages();
    updateMsgCount();

    try {
        if (currentRole === 'customer') {
            msg.translation = await translateText(text, 'vi', 'zh');
        } else {
            msg.translation = await translateText(text, 'zh', 'vi');
        }
    } catch(err) {
        console.error('Translation error:', err);
        msg.translation = '翻译失败，请重试';
    }

    renderMessages();
    isProcessing = false;
    updateSendBtnState();
}

function updateSendBtnState() {
    document.getElementById('sendBtn').disabled = isProcessing;
}

function handleKeyDown(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
    }
}

// ==================== Translation ====================
async function translateText(text, from, to) {
    try {
        const systemPrompt = from === 'vi'
            ? getViToZhPrompt()
            : getZhToViPrompt();

        const result = await callDeepSeek(systemPrompt, text);
        if (result) return result;
    } catch(e) {
        console.warn('AI translation failed:', e);
    }

    return builtInTranslate(text, from, to);
}

// ==================== 中文 → 越南语 提示词（v3 深度优化版） ====================
function getZhToViPrompt() {
    return `你是一位在越南胡志明市做翡翠珠宝直播电商的中国卖家，每天用越南语跟几百个客户聊天。你用越南语说话的时候，越南人完全分不出你是外国人。

【越南语思维模式 —— 核心原则】
越南语和中文的语序、表达逻辑完全不同。翻译时必须用越南人的思维方式重新组织句子，而不是把中文逐词替换成越南语。
- 中文"这个手镯种水很好" → 不要说 "vòng tay này thủy rất tốt"，要说 "sợi này nước đẹp lắm nha" 或 "con này trong suốt đẹp cháy máy"
- 中文"天然A货翡翠" → 不要说 "ngọc bích hàng A tự nhiên"，要说 "hàng ngọc tự nhiên 100% nha" 或 "ngọc thật 100% luôn nha"
- 中文"可以便宜一点吗" → 不要说 "có thể rẻ hơn một chút không"，要说 "giảm chút được không chị ơi" 或 "cho giá tốt chút nha"
- 中文"质量绝对保证" → 不要说 "chất lượng tuyệt đối đảm bảo"，要说 "chất lượng em đảm bảo 10 điểm không có nhưng nha"

【越南人的说话习惯】
1. 语气词是灵魂 —— 几乎每句话结尾都带语气词：
   - nha：最万能的语气词，类似中文的"哦/啊"，让语气变柔和 → "đẹp nha"（好看哦）、"gửi nha"（发给你哦）
   - nhen：比 nha 更亲昵、更撒娇，适合对女客户 → "chốt cho em nhen"
   - nhé：友好但不过分亲昵，适合同事/通用 → "để em check nhé"
   - nè/ni：放在句中强调，"cái này nè"（这个呢）
   - mà：转折或解释，"đẹp mà rẻ"（又好看又便宜）
   - thôi：建议或催促，"chốt thôi"（赶紧下单吧）
   - hả：疑问，"được hả"（可以吗？）
   - chưa：反问，"chị chốt chưa"（姐姐下单了没？）
   
2. 自称和称呼：
   - 卖家自称用 "em"（最常见、最亲切），偶尔用 "mình"
   - 称呼客户：女客户用 "chị"（姐姐），男客户用 "anh"（哥哥），年轻客户用 "bạn"
   - 不要用 "tôi"（太正式生硬）、"quý khách"（太商务疏远）
   
3. 省略和简化：
   - 越南人说话很简练，能省则省
   - 不说 "tôi sẽ gửi cho bạn"（太冗长），说 "em gửi nha" 或 "gửi liền nha"
   - 不说 "bạn có muốn mua không"，说 "chị lấy không" 或 "chốt không nha"

【数量和价格缩写 —— 必须使用】
- 1c = 1 cái（1个）、2c = 2 cái、3c = 3 cái
- 1s = 1 sợi（1条手镯/项链）、2s = 2 sợi
- 1d = 1 đôi（1对耳环）、1bó = 1把

- 注意：越南用 k（千）和 tr（百万/兆）表示价格，直播里不说 "năm trăm nghìn"

【翡翠珠宝术语 —— 越南本地叫法】
- 翡翠 = ngọc bích（最常用）/ ngọc cẩm thạch
- 水晶 = thạch anh，珍珠 = ngọc trai
- 吊坠 = mặt dây chuyền / mặt dây（缩写），戒指 = nhẫn，手镯 = vòng tay / lắc tay / sợi
- 耳环 = bông tai / khuyên tai，项链 = dây chuyền，脚链 = lắc chân
- 天然 = tự nhiên 100%（强调时加100%）、A货 = hàng A / hàng tự nhiên
- 种/种水 = nước（越南人用"水"形容种水）→ "nước đẹp" = 种水好、"nước đục" = 种差
- 冰种 = băng chủng，玻璃种 = kính chủng，糯种 = nhão chủng
- 飘花 = phiêu hoa，满绿 = lộc vưng / xanh lộc（越南人爱说"绿"用 lộc）
- 起胶 = bóng keo / có keo，起荧 = phát quang
- 色深 = đậm，色浅 = nhạt，色匀 = đều màu，发黑 = thâm
- 裂纹 = nứt / rạn，棉 = bông / mây（越语棉花/云 = 棉），石纹 = vân đá
- 证书 = giấy kiểm định / chứng chỉ

【越南人爱用的夸张/情绪表达】
- "đẹp cháy máy" = 好看到炸（字面：漂亮到机器烧起来）
- "đẹp đến mức không thể đẹp hơn" = 美到无法更美
- "xinh quá đi mất" = 太美了吧
- "chuẩn không cần chỉnh" = 完美不需要调
- "siêu phẩm" = 超级精品
- "vip pro" = 超VIP
- "10 điểm không có nhưng" = 10分满分没毛病
- "yêu quá đi" = 太爱了
- "nhìn là muốn chốt" = 看一眼就想下单
- "mê cứng ngắc" = 爱到不行（字面：硬邦邦地迷上）

【南方口音和北方用语的取舍】
越南南北方用语有差异，但电商直播以南方（胡志明市）风格为主：
- "xịn" 比 "tốt" 更口语化（好/棒）→ "sợi này xịn nè" = 这条很棒
- "ngon" = 好的/好吃的，但直播里也常说 "món ngon nè" = 这款很好
- 南方人更随意、更爱缩写，不要用太北方的正式表达

【绝对不能犯的翻译错误】
1. 逐字翻译 → 越南人说"tiếng Trung máy dịch"（中文机翻）就是嘲笑这种
2. 用 "tôi" 自称 → 暴露外国人身份
3. 用 "quý khách" → 像银行客服，不像直播卖家
4. 句子太长 → 越南人习惯短句，长句拆成2-3句
5. 丢失语气词 → 没有语气词的越南语像机器人说话
6. 用书面词汇代替口语词 → "mua sắm"不要用，说"mua"；"vận chuyển"不要用，说"giao/ship"

【最终规则】
- 只返回翻译后的越南语文本
- 不要加引号、不要加解释、不要写"翻译如下："
- 如果原文很简短（如"好的"），翻译也要简短（如"Ok nha"），不要画蛇添足
- 翻译结果要直接可以复制粘贴发送，客户看了觉得是一个越南人在说话`;

// ==================== DeepSeek API ====================
async function callDeepSeek(systemPrompt, userMessage) {
    const baseUrl = AI_CONFIG.baseUrl.replace(/\/$/, '');
    const response = await fetch(`${baseUrl}/chat/completions`, {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${AI_CONFIG.apiKey}`
        },
        body: JSON.stringify({
            model: AI_CONFIG.model,
            messages: [
                { role: 'system', content: systemPrompt },
                { role: 'user', content: userMessage }
            ],
            temperature: 0.3,
            max_tokens: 1000
        })
    });

    if (!response.ok) {
        throw new Error(`API error ${response.status}`);
    }

    const data = await response.json();
    return data.choices?.[0]?.message?.content?.trim() || '';
}

const builtInTranslations = {
    'xin chào': '你好', 'xin chao': '你好', 'chào bạn': '你好',
    'cảm ơn': '谢谢', 'cam on': '谢谢', 'cảm ơn bạn': '谢谢您',

    'giá bao nhiêu': '多少钱', 'bao nhiêu tiền': '多少钱', 'giá': '价格',
    'rẻ': '便宜', 'đắt': '贵',
    'giảm giá không': '可以优惠吗', 'giảm giá': '优惠',
    'mua': '买', 'bán': '卖',
    'giao hàng': '发货', 'vận chuyển': '运输', 'phí ship': '运费',
    'số lượng lớn': '大批量', 'giá sỉ': '批发价',
    'tự nhiên': '天然', 'giấy kiểm định': '鉴定证书',
    'đẹp': '漂亮', 'ảnh': '照片',
    'một': '一', 'hai': '二', 'ba': '三', 'bốn': '四', 'năm': '五',
    'sáu': '六', 'bảy': '七', 'tám': '八', 'chín': '九', 'mười': '十',
    'trăm': '百', 'nghìn': '千', 'triệu': '万',
    'bao lâu': '多久', 'mất bao lâu': '需要多久',
    'về việt nam': '到越南', 'tôi muốn': '我想',
    'cho tôi xem': '给我看', 'này': '这个', 'đó': '那个',
    'thêm': '更多', 'lại': '再',
};

const zhToViDict = {};
Object.entries(builtInTranslations).forEach(([vi, zh]) => {
    if (!zhToViDict[zh]) zhToViDict[zh] = vi;
});

function builtInTranslate(text, from, to) {
    const lower = text.toLowerCase().trim();

    if (from === 'vi' && to === 'zh') {
        if (builtInTranslations[lower]) return builtInTranslations[lower];
        let remaining = lower;
        const sortedKeys = Object.keys(builtInTranslations).sort((a, b) => b.length - a.length);
        for (const key of sortedKeys) {
            if (remaining.includes(key)) {
                remaining = remaining.replace(new RegExp(key.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi'), builtInTranslations[key]);
            }
        }
        const result = remaining.trim();
        return result !== lower ? result : '[请检查网络连接]\n原文：' + text;
    }

    if (from === 'zh' && to === 'vi') {
        let remaining = text;
        const sortedKeys = Object.keys(zhToViDict).sort((a, b) => b.length - a.length);
        for (const key of sortedKeys) {
            if (remaining.includes(key)) {
                remaining = remaining.replace(new RegExp(key.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'g'), zhToViDict[key]);
            }
        }
        const result = remaining.trim();
        return result !== text ? result : '[Vui lòng kiểm tra kết nối mạng]\nNội dung gốc: ' + text;
    }

    return text;
}

function swapQTDirection() {
    const from = document.getElementById('qtFrom');
    const to = document.getElementById('qtTo');
    const temp = from.value;
    from.value = to.value;
    to.value = temp;

    const input = document.getElementById('qtInput');
    const output = document.getElementById('qtOutput');
    const tempText = input.value;
    input.value = output.value;
    output.value = tempText;
}

async function quickTranslate() {
    const input = document.getElementById('qtInput');
    const output = document.getElementById('qtOutput');
    const btn = document.getElementById('qtBtn');
    const text = input.value.trim();

    if (!text) {
        showToast('请输入要翻译的文本');
        return;
    }

    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 翻译中...';
    output.value = '翻译中...';

    const from = document.getElementById('qtFrom').value;
    const to = document.getElementById('qtTo').value;

    try {
        const result = await translateText(text, from, to);
        output.value = result;

        const dirLabel = from === 'vi' ? '越南语 → 中文' : '中文 → 越南语';
        quickHistory.unshift({ from: text, to: result, dir: dirLabel });
        if (quickHistory.length > 50) quickHistory.pop();
        localStorage.setItem('vnzh_deepseek_v3_qt_history', JSON.stringify(quickHistory));
        renderHistory();
    } catch(err) {
        output.value = '翻译失败，请重试';
    }

    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-magic"></i> 翻译';
}

function renderHistory() {
    const container = document.getElementById('qtHistory');
    if (quickHistory.length === 0) {
        container.innerHTML = '<div style="text-align:center;color:var(--text-muted);font-size:12px;padding:20px 0">暂无翻译记录</div>';
        return;
    }
    container.innerHTML = quickHistory.map((h, i) => `
        <div class="history-item" onclick="copyText('${h.to.replace(/'/g, "\\'").replace(/\n/g, "\\n")}')">
            <div class="h-direction">${h.dir}</div>
            <div class="h-from">${escapeHtmlShort(h.from)}</div>
            <div class="h-to">${escapeHtmlShort(h.to)}</div>
        </div>
    `).join('');
}

function clearHistory() {
    quickHistory = [];
    localStorage.removeItem('vnzh_deepseek_v3_qt_history');
    renderHistory();
    showToast('翻译记录已清空');
}

// ==================== Render Messages ====================
function renderMessages() {
    const container = document.getElementById('chatMessages');

    if (messages.length === 0) {
        container.innerHTML = `
            <div class="empty-state">
                <i class="fas fa-language"></i>
                <h3>开始对话翻译</h3>
                <p>选择角色后输入内容，发送即可自动翻译<br>客户消息翻译为中文，你的回复翻译为越南语</p>
            </div>`;
        return;
    }

    container.innerHTML = messages.map(msg => {
        const roleClass = msg.role === 'customer' ? 'customer' : 'merchant';
        const avatarIcon = msg.role === 'customer' ? '<i class="fas fa-user"></i>' : '<i class="fas fa-store"></i>';
        const translationLabel = msg.role === 'customer' ? '中文翻译' : '越南语翻译';

        let translationHtml = '';
        if (msg.translation) {
            translationHtml = `
                <div class="msg-translation" onclick="copyText(this.dataset.text)" data-text="${escapeAttr(msg.translation)}">
                    <i class="fas fa-language"></i>
                    <span><strong>${translationLabel}：</strong>${escapeHtmlContent(msg.translation)}</span>
                    <i class="fas fa-copy" style="margin-left:auto;font-size:11px;color:#999"></i>
                </div>`;
        } else {
            translationHtml = `
                <div class="msg-translation" style="opacity:0.6">
                    <div class="typing-indicator"><span></span><span></span><span></span></div>
                </div>`;
        }

        return `
            <div class="message ${roleClass}">
                <div class="msg-avatar">${avatarIcon}</div>
                <div class="msg-content">
                    <div class="msg-bubble">${escapeHtmlContent(msg.text)}</div>
                    ${translationHtml}
                    <div class="msg-time">${msg.time}</div>
                </div>
            </div>`;
    }).join('');

    container.scrollTop = container.scrollHeight;
}

// ==================== Utilities ====================
function escapeHtmlContent(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML.replace(/\n/g, '<br>');
}

function escapeHtmlShort(text) {
    const div = document.createElement('div');
    div.textContent = text.length > 80 ? text.substring(0, 80) + '...' : text;
    return div.innerHTML;
}

function escapeAttr(text) {
    return text.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '&#10;');
}

function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function copyText(text) {
    navigator.clipboard.writeText(text).then(() => {
        showToast('已复制到剪贴板');
    }).catch(() => {
        const ta = document.createElement('textarea');
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        showToast('已复制到剪贴板');
    });
}

function showToast(text) {
    const toast = document.getElementById('toast');
    document.getElementById('toastText').textContent = text;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
}

function clearChat() {
    if (messages.length === 0) return;
    if (!confirm('确定要清空所有对话记录吗？')) return;
    messages = [];
    renderMessages();
    updateMsgCount();
    showToast('对话已清空');
}

function updateMsgCount() {
    document.getElementById('msgCount').textContent = `${messages.length} 条消息`;
}

// ==================== Init ====================
init();
</script>
