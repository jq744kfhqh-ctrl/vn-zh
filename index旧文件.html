<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中越翻译助手 · 翡翠外贸</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --jade-dark: #1a3a2a;
            --jade: #2d6a4f;
            --jade-light: #40916c;
            --jade-pale: #b7e4c7;
            --jade-cream: #d8f3dc;
            --gold: #d4a843;
            --gold-light: #f0d78c;
            --gold-dark: #b8860b;
            --bg: #f4f7f5;
            --card: #ffffff;
            --text: #1a1a2e;
            --text-muted: #6b7280;
            --border: #e5e7eb;
            --shadow: 0 4px 24px rgba(45, 106, 79, 0.08);
            --shadow-lg: 0 8px 40px rgba(45, 106, 79, 0.12);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', 'Noto Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%;
            right: -30%;
            width: 80vw;
            height: 80vw;
            background: radial-gradient(circle, rgba(45,106,79,0.04) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -40%;
            left: -20%;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, rgba(212,168,67,0.04) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, var(--jade-dark) 0%, var(--jade) 50%, var(--jade-light) 100%);
            color: white;
            padding: 0;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(26, 58, 42, 0.15);
        }

        .header-inner {
            max-width: 1400px;
            margin: 0 auto;
            padding: 14px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--gold), var(--gold-light));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: var(--jade-dark);
            box-shadow: 0 2px 10px rgba(212,168,67,0.3);
        }

        .logo-text h1 {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .logo-text p {
            font-size: 11px;
            opacity: 0.8;
            font-weight: 300;
        }

        .header-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 13px;
            font-family: inherit;
            font-weight: 500;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-ghost {
            background: rgba(255,255,255,0.15);
            color: white;
            backdrop-filter: blur(4px);
        }

        .btn-ghost:hover {
            background: rgba(255,255,255,0.25);
        }

        .btn-gold {
            background: linear-gradient(135deg, var(--gold), var(--gold-light));
            color: var(--jade-dark);
        }

        .btn-gold:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(212,168,67,0.4);
        }

        /* Main Layout */
        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 20px;
            position: relative;
            z-index: 1;
        }

        /* Chat Panel */
        .chat-panel {
            background: var(--card);
            border-radius: 16px;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            height: calc(100vh - 90px);
        }

        .chat-header {
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(to right, var(--jade-cream), white);
        }

        .chat-header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chat-header-left i {
            color: var(--jade);
            font-size: 18px;
        }

        .chat-header-left h2 {
            font-size: 15px;
            font-weight: 600;
            color: var(--jade-dark);
        }

        .chat-header-left span {
            font-size: 12px;
            color: var(--text-muted);
        }

        .msg-count {
            background: var(--jade);
            color: white;
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: 500;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: var(--jade-pale);
            border-radius: 3px;
        }

        /* Message bubbles */
        .message {
            display: flex;
            gap: 10px;
            max-width: 80%;
            animation: fadeInUp 0.3s ease;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.customer {
            align-self: flex-start;
        }

        .message.merchant {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .msg-avatar {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }

        .customer .msg-avatar {
            background: linear-gradient(135deg, #ff6b6b, #ffa07a);
            color: white;
        }

        .merchant .msg-avatar {
            background: linear-gradient(135deg, var(--jade), var(--jade-light));
            color: white;
        }

        .msg-content {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .msg-bubble {
            padding: 12px 16px;
            border-radius: 14px;
            font-size: 14px;
            line-height: 1.6;
        }

        .customer .msg-bubble {
            background: #f0f0f0;
            color: var(--text);
            border-bottom-left-radius: 4px;
        }

        .merchant .msg-bubble {
            background: linear-gradient(135deg, var(--jade), var(--jade-light));
            color: white;
            border-bottom-right-radius: 4px;
        }

        .msg-translation {
            font-size: 12px;
            padding: 8px 12px;
            border-radius: 8px;
            display: flex;
            align-items: flex-start;
            gap: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .msg-translation:hover {
            transform: translateX(2px);
        }

        .customer .msg-translation {
            background: #fff8e1;
            border-left: 3px solid var(--gold);
            color: var(--text);
        }

        .merchant .msg-translation {
            background: #e8f5e9;
            border-left: 3px solid var(--jade-light);
            color: var(--text);
        }

        .msg-translation i {
            font-size: 10px;
            margin-top: 3px;
            flex-shrink: 0;
        }

        .msg-time {
            font-size: 11px;
            color: var(--text-muted);
            padding: 0 4px;
        }

        .merchant .msg-time {
            text-align: right;
        }

        /* Input Area */
        .chat-input-area {
            padding: 14px 20px;
            border-top: 1px solid var(--border);
            background: white;
        }

        .input-role-toggle {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }

        .role-btn {
            padding: 6px 14px;
            border-radius: 20px;
            border: 1.5px solid var(--border);
            background: white;
            cursor: pointer;
            font-size: 12px;
            font-family: inherit;
            font-weight: 500;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .role-btn.active {
            border-color: var(--jade);
            background: var(--jade-cream);
            color: var(--jade-dark);
        }

        .role-btn.customer.active {
            border-color: #ff6b6b;
            background: #fff0f0;
            color: #c0392b;
        }

        .input-row {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .input-wrapper {
            flex: 1;
        }

        .input-wrapper textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid var(--border);
            border-radius: 12px;
            font-size: 14px;
            font-family: inherit;
            resize: none;
            outline: none;
            transition: border-color 0.2s;
            background: #fafbfc;
            min-height: 44px;
            max-height: 120px;
            line-height: 1.5;
        }

        .input-wrapper textarea:focus {
            border-color: var(--jade-light);
            background: white;
        }

        .input-wrapper textarea::placeholder {
            color: #b0b0b0;
        }

        .send-btn {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, var(--jade), var(--jade-light));
            color: white;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .send-btn:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(45, 106, 79, 0.3);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Right Panel */
        .right-panel {
            display: flex;
            flex-direction: column;
            gap: 16px;
            height: calc(100vh - 90px);
        }

        .panel-card {
            background: var(--card);
            border-radius: 14px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .panel-card-header {
            padding: 14px 18px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 600;
            color: var(--jade-dark);
        }

        .panel-card-header i {
            color: var(--gold);
        }

        .panel-card-body {
            padding: 16px 18px;
        }

        /* Quick Translate */
        .quick-translate {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .qt-direction {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .qt-select {
            flex: 1;
            padding: 8px 12px;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            font-size: 13px;
            font-family: inherit;
            outline: none;
            background: white;
        }

        .qt-swap {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 1.5px solid var(--border);
            background: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--jade);
            font-size: 12px;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .qt-swap:hover {
            background: var(--jade-cream);
            border-color: var(--jade-light);
        }

        .qt-input, .qt-output {
            padding: 12px;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            font-size: 13px;
            font-family: inherit;
            outline: none;
            resize: none;
            min-height: 100px;
            line-height: 1.6;
            width: 100%;
        }

        .qt-input {
            background: #fafbfc;
        }

        .qt-input:focus {
            border-color: var(--jade-light);
            background: white;
        }

        .qt-output {
            background: var(--jade-cream);
            border-color: var(--jade-pale);
            color: var(--jade-dark);
            font-weight: 500;
        }

        .qt-btn {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--jade), var(--jade-light));
            color: white;
            font-size: 13px;
            font-family: inherit;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .qt-btn:hover:not(:disabled) {
            box-shadow: 0 4px 12px rgba(45, 106, 79, 0.3);
        }

        .qt-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .qt-history {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .qt-history::-webkit-scrollbar {
            width: 4px;
        }

        .qt-history::-webkit-scrollbar-thumb {
            background: var(--jade-pale);
            border-radius: 2px;
        }

        .history-item {
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 12px;
            line-height: 1.5;
            cursor: pointer;
            transition: all 0.2s;
        }

        .history-item:hover {
            border-color: var(--jade-light);
            background: var(--jade-cream);
        }

        .history-item .h-from {
            color: var(--text);
            margin-bottom: 4px;
            word-break: break-word;
        }

        .history-item .h-to {
            color: var(--jade-dark);
            font-weight: 500;
            word-break: break-word;
        }

        .history-item .h-direction {
            font-size: 10px;
            color: var(--text-muted);
            margin-bottom: 2px;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--jade-dark);
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
            z-index: 1000;
            transition: transform 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: var(--shadow-lg);
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        /* Empty state */
        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            gap: 12px;
            padding: 40px;
        }

        .empty-state i {
            font-size: 48px;
            color: var(--jade-pale);
        }

        .empty-state h3 {
            font-size: 16px;
            color: var(--text);
            font-weight: 600;
        }

        .empty-state p {
            font-size: 13px;
            text-align: center;
            line-height: 1.6;
        }

        /* Typing indicator */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 8px 0;
        }

        .typing-indicator span {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--jade-pale);
            animation: typing 1.2s infinite;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-6px); opacity: 1; }
        }

        /* Responsive */
        @media (max-width: 900px) {
            .main-container {
                grid-template-columns: 1fr;
            }
            .right-panel {
                height: auto;
            }
            .chat-panel {
                height: 60vh;
            }
        }

        .api-status {
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 4px;
            font-weight: 500;
        }

        .api-status.connected {
            background: rgba(255,255,255,0.2);
            color: #d4edda;
        }

        .api-status.simulated {
            background: rgba(255,255,255,0.15);
            color: #fff3cd;
        }

        /* Settings modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            z-index: 200;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal {
            background: white;
            border-radius: 16px;
            width: 480px;
            max-width: 90vw;
            box-shadow: var(--shadow-lg);
            overflow: hidden;
        }

        .modal-header {
            padding: 18px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .modal-header h3 {
            font-size: 16px;
            font-weight: 600;
        }

        .modal-close {
            width: 32px;
            height: 32px;
            border: none;
            background: #f0f0f0;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .modal-close:hover {
            background: #e0e0e0;
        }

        .modal-body {
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 6px;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            font-size: 13px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group input:focus, .form-group select:focus {
            border-color: var(--jade-light);
        }

        .form-group .hint {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .modal-footer {
            padding: 16px 24px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
            gap: 8px;
        }

        .btn-primary {
            background: var(--jade);
            color: white;
        }

        .btn-primary:hover {
            background: var(--jade-dark);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: var(--text);
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }
    </style>
</head>
<body>

<!-- Header -->
<header class="header">
    <div class="header-inner">
        <div class="logo">
            <div class="logo-icon">💎</div>
            <div class="logo-text">
                <h1>中越翻译助手</h1>
                <p>Jade Trade Translation</p>
            </div>
        </div>
        <div class="header-actions">
            <span class="api-status simulated" id="apiStatus">
                <i class="fas fa-circle" style="font-size:6px;vertical-align:middle"></i> 内置翻译
            </span>
            <button class="btn btn-ghost" onclick="clearChat()">
                <i class="fas fa-broom"></i> 清空
            </button>
            <button class="btn btn-gold" onclick="toggleSettings()">
                <i class="fas fa-cog"></i> API 设置
            </button>
        </div>
    </div>
</header>

<!-- Main Content -->
<div class="main-container">
    <!-- Chat Panel -->
    <div class="chat-panel">
        <div class="chat-header">
            <div class="chat-header-left">
                <i class="fas fa-comments"></i>
                <div>
                    <h2>对话翻译</h2>
                    <span>粘贴对话内容，自动翻译</span>
                </div>
            </div>
            <span class="msg-count" id="msgCount">0 条消息</span>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="empty-state" id="emptyState">
                <i class="fas fa-language"></i>
                <h3>开始对话翻译</h3>
                <p>选择角色后输入内容，发送即可自动翻译<br>客户消息翻译为中文，你的回复翻译为越南语</p>
            </div>
        </div>

        <div class="chat-input-area">
            <div class="input-role-toggle">
                <button class="role-btn customer active" id="roleCustomer" onclick="setRole('customer')">
                    <i class="fas fa-user"></i> 客户消息 (越南语)
                </button>
                <button class="role-btn merchant" id="roleMerchant" onclick="setRole('merchant')">
                    <i class="fas fa-store"></i> 我的回复 (中文)
                </button>
            </div>
            <div class="input-row">
                <div class="input-wrapper">
                    <textarea id="msgInput" placeholder="粘贴客户发来的越南语消息..." rows="1" oninput="autoResize(this)" onkeydown="handleKeyDown(event)"></textarea>
                </div>
                <button class="send-btn" onclick="sendMessage()" id="sendBtn">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Right Panel -->
    <div class="right-panel">
        <!-- Quick Translate -->
        <div class="panel-card">
            <div class="panel-card-header">
                <i class="fas fa-exchange-alt"></i> 快速翻译
            </div>
            <div class="panel-card-body">
                <div class="quick-translate">
                    <div class="qt-direction">
                        <select class="qt-select" id="qtFrom">
                            <option value="vi">🇻🇳 越南语</option>
                            <option value="zh">🇨🇳 中文</option>
                        </select>
                        <button class="qt-swap" onclick="swapQTDirection()">
                            <i class="fas fa-exchange-alt"></i>
                        </button>
                        <select class="qt-select" id="qtTo">
                            <option value="zh">🇨🇳 中文</option>
                            <option value="vi">🇻🇳 越南语</option>
                        </select>
                    </div>
                    <textarea class="qt-input" id="qtInput" placeholder="输入要翻译的文本..." oninput="autoResize(this)"></textarea>
                    <textarea class="qt-output" id="qtOutput" placeholder="翻译结果显示在这里..." readonly></textarea>
                    <button class="qt-btn" onclick="quickTranslate()" id="qtBtn">
                        <i class="fas fa-magic"></i> 翻译
                    </button>
                </div>
            </div>
        </div>

        <!-- Translation History -->
        <div class="panel-card" style="flex:1;display:flex;flex-direction:column;min-height:0">
            <div class="panel-card-header">
                <i class="fas fa-history"></i> 翻译记录
                <button class="btn btn-ghost" style="margin-left:auto;padding:4px 10px;font-size:11px" onclick="clearHistory()">
                    <i class="fas fa-trash"></i> 清空
                </button>
            </div>
            <div class="panel-card-body" style="flex:1;overflow-y:auto;padding:12px 14px">
                <div class="qt-history" id="qtHistory">
                    <div style="text-align:center;color:var(--text-muted);font-size:12px;padding:20px 0">
                        暂无翻译记录
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Settings Modal -->
<div class="modal-overlay" id="settingsModal">
    <div class="modal">
        <div class="modal-header">
            <h3><i class="fas fa-cog" style="color:var(--gold);margin-right:8px"></i>API 设置</h3>
            <button class="modal-close" onclick="toggleSettings()">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="modal-body">
            <div class="form-group">
                <label>AI 服务提供商</label>
                <select id="aiProvider">
                    <option value="openai">OpenAI (GPT-4 / GPT-3.5)</option>
                    <option value="custom">自定义 API (兼容 OpenAI 格式)</option>
                    <option value="none">不使用 API（内置基础翻译）</option>
                </select>
            </div>
            <div class="form-group">
                <label>API Key</label>
                <input type="password" id="apiKey" placeholder="sk-...">
                <div class="hint">密钥仅保存在本地浏览器，不会上传到任何服务器</div>
            </div>
            <div class="form-group">
                <label>API 地址 (Base URL)</label>
                <input type="text" id="apiBase" placeholder="https://api.openai.com/v1">
                <div class="hint">使用自定义 API 时填写，留空使用 OpenAI 默认地址</div>
            </div>
            <div class="form-group">
                <label>模型名称</label>
                <input type="text" id="modelName" placeholder="gpt-4o-mini">
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="toggleSettings()">取消</button>
            <button class="btn btn-primary" onclick="saveSettings()">保存设置</button>
        </div>
    </div>
</div>

<!-- Toast -->
<div class="toast" id="toast">
    <i class="fas fa-check-circle"></i>
    <span id="toastText"></span>
</div>

<script>
// ==================== Configuration ====================
let config = {
    provider: 'none',
    apiKey: '',
    baseUrl: 'https://api.openai.com/v1',
    model: 'gpt-4o-mini'
};

try {
    const saved = localStorage.getItem('vnzh_config');
    if (saved) config = JSON.parse(saved);
} catch(e) {}

// ==================== State ====================
let messages = [];
let currentRole = 'customer';
let isProcessing = false;
let quickHistory = [];

// Load quick history
try {
    const saved = localStorage.getItem('vnzh_qt_history');
    if (saved) quickHistory = JSON.parse(saved);
} catch(e) {}

// ==================== Initialize ====================
function init() {
    updatePlaceholder();
    loadSettingsToUI();
    updateMsgCount();
    renderHistory();
}

function loadSettingsToUI() {
    document.getElementById('aiProvider').value = config.provider;
    document.getElementById('apiKey').value = config.apiKey;
    document.getElementById('apiBase').value = config.baseUrl;
    document.getElementById('modelName').value = config.model;
    updateApiStatus();
}

function updateApiStatus() {
    const el = document.getElementById('apiStatus');
    if (config.provider !== 'none' && config.apiKey) {
        el.className = 'api-status connected';
        el.innerHTML = '<i class="fas fa-circle" style="font-size:6px;vertical-align:middle"></i> AI 已连接';
    } else {
        el.className = 'api-status simulated';
        el.innerHTML = '<i class="fas fa-circle" style="font-size:6px;vertical-align:middle"></i> 内置翻译';
    }
}

// ==================== Role Toggle ====================
function setRole(role) {
    currentRole = role;
    document.getElementById('roleCustomer').classList.toggle('active', role === 'customer');
    document.getElementById('roleMerchant').classList.toggle('active', role === 'merchant');
    updatePlaceholder();
}

function updatePlaceholder() {
    const input = document.getElementById('msgInput');
    if (currentRole === 'customer') {
        input.placeholder = '粘贴客户发来的越南语消息...';
    } else {
        input.placeholder = '输入你的中文回复...';
    }
}

// ==================== Send Message (核心修复) ====================
async function sendMessage() {
    const input = document.getElementById('msgInput');
    const text = input.value.trim();
    if (!text || isProcessing) return;

    isProcessing = true;
    updateSendBtnState();

    input.value = '';
    autoResize(input);

    const msg = {
        id: Date.now(),
        role: currentRole,
        text: text,
        translation: '',
        time: new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' })
    };

    messages.push(msg);
    renderMessages();
    updateMsgCount();

    // Translate with try/catch to ensure lock always releases
    try {
        if (currentRole === 'customer') {
            msg.translation = await translateText(text, 'vi', 'zh');
        } else {
            msg.translation = await translateText(text, 'zh', 'vi');
        }
    } catch(err) {
        console.error('Translation error:', err);
        msg.translation = '翻译失败，请重试';
    }

    renderMessages();

    // Always release lock in finally
    isProcessing = false;
    updateSendBtnState();
}

function updateSendBtnState() {
    document.getElementById('sendBtn').disabled = isProcessing;
}

function handleKeyDown(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
    }
}

// ==================== Translation ====================
async function translateText(text, from, to) {
    // Try AI API first
    if (config.provider !== 'none' && config.apiKey) {
        try {
            const systemPrompt = from === 'vi'
                ? '你是一位专业的越南语-中文翻译，专精于翡翠珠宝外贸领域。请准确翻译以下越南语为自然流畅的中文。只返回翻译结果，不要解释。'
                : '你是一位专业的中文-越南语翻译，专精于翡翠珠宝外贸领域。请将以下中文翻译为地道的越南语，语气礼貌、专业。只返回翻译结果，不要解释。';

            const result = await callAI(systemPrompt, text);
            if (result) return result;
        } catch(e) {
            console.warn('AI translation failed, falling back:', e);
        }
    }

    // Fallback to built-in
    return builtInTranslate(text, from, to);
}

function builtInTranslate(text, from, to) {
    const lower = text.toLowerCase().trim();

    if (from === 'vi' && to === 'zh') {
        if (builtInTranslations[lower]) return builtInTranslations[lower];

        let remaining = lower;
        const sortedKeys = Object.keys(builtInTranslations).sort((a, b) => b.length - a.length);
        for (const key of sortedKeys) {
            if (remaining.includes(key)) {
                remaining = remaining.replace(new RegExp(key.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi'), builtInTranslations[key]);
            }
        }
        const result = remaining.trim();
        return result !== lower ? result : '[请接入AI API获取准确翻译]\n原文：' + text;
    }

    if (from === 'zh' && to === 'vi') {
        let remaining = text;
        const sortedKeys = Object.keys(zhToViDict).sort((a, b) => b.length - a.length);
        for (const key of sortedKeys) {
            if (remaining.includes(key)) {
                remaining = remaining.replace(new RegExp(key.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'g'), zhToViDict[key]);
            }
        }
        const result = remaining.trim();
        return result !== text ? result : '[Vui lòng kết nối API AI]\nNội dung gốc: ' + text;
    }

    return text;
}

// ==================== Built-in Dictionary ====================
const builtInTranslations = {
    'xin chào': '你好', 'xin chao': '你好', 'chào bạn': '你好',
    'cảm ơn': '谢谢', 'cam on': '谢谢', 'cảm ơn bạn': '谢谢您',
    'vâng': '是的', 'không': '不', 'được': '可以',
    'tôi': '我', 'bạn': '你',
    '翡翠': '翡翠', 'ngọc': '玉', 'đá quý': '宝石',
    'giá bao nhiêu': '多少钱', 'bao nhiêu tiền': '多少钱', 'giá': '价格',
    'rẻ': '便宜', 'đắt': '贵',
    'giảm giá không': '可以优惠吗', 'giảm giá': '优惠',
    'mua': '买', 'bán': '卖',
    'giao hàng': '发货', 'vận chuyển': '运输', 'phí ship': '运费',
    'số lượng lớn': '大批量', 'giá sỉ': '批发价',
    'tự nhiên': '天然', 'giấy kiểm định': '鉴定证书',
    'đẹp': '漂亮', 'ảnh': '照片',
    'một': '一', 'hai': '二', 'ba': '三', 'bốn': '四', 'năm': '五',
    'sáu': '六', 'bảy': '七', 'tám': '八', 'chín': '九', 'mười': '十',
    'trăm': '百', 'nghìn': '千', 'triệu': '万',
    'bao lâu': '多久', 'mất bao lâu': '需要多久',
    'về việt nam': '到越南', 'tôi muốn': '我想',
    'cho tôi xem': '给我看', 'này': '这个', 'đó': '那个',
    'thêm': '更多', 'lại': '再',
};

const zhToViDict = {};
Object.entries(builtInTranslations).forEach(([vi, zh]) => {
    if (!zhToViDict[zh]) zhToViDict[zh] = vi;
});

// ==================== AI API ====================
async function callAI(systemPrompt, userMessage) {
    const baseUrl = config.baseUrl.replace(/\/$/, '');
    const response = await fetch(`${baseUrl}/chat/completions`, {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${config.apiKey}`
        },
        body: JSON.stringify({
            model: config.model,
            messages: [
                { role: 'system', content: systemPrompt },
                { role: 'user', content: userMessage }
            ],
            temperature: 0.3,
            max_tokens: 1000
        })
    });

    if (!response.ok) {
        throw new Error(`API error ${response.status}`);
    }

    const data = await response.json();
    return data.choices?.[0]?.message?.content?.trim() || '';
}

// ==================== Quick Translate ====================
function swapQTDirection() {
    const from = document.getElementById('qtFrom');
    const to = document.getElementById('qtTo');
    const temp = from.value;
    from.value = to.value;
    to.value = temp;

    const input = document.getElementById('qtInput');
    const output = document.getElementById('qtOutput');
    const tempText = input.value;
    input.value = output.value;
    output.value = tempText;
}

async function quickTranslate() {
    const input = document.getElementById('qtInput');
    const output = document.getElementById('qtOutput');
    const btn = document.getElementById('qtBtn');
    const text = input.value.trim();

    if (!text) {
        showToast('请输入要翻译的文本');
        return;
    }

    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 翻译中...';
    output.value = '翻译中...';

    const from = document.getElementById('qtFrom').value;
    const to = document.getElementById('qtTo').value;

    try {
        const result = await translateText(text, from, to);
        output.value = result;

        // Save to history
        const dirLabel = from === 'vi' ? '越南语 → 中文' : '中文 → 越南语';
        quickHistory.unshift({ from: text, to: result, dir: dirLabel });
        if (quickHistory.length > 50) quickHistory.pop();
        localStorage.setItem('vnzh_qt_history', JSON.stringify(quickHistory));
        renderHistory();
    } catch(err) {
        output.value = '翻译失败，请重试';
    }

    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-magic"></i> 翻译';
}

function renderHistory() {
    const container = document.getElementById('qtHistory');
    if (quickHistory.length === 0) {
        container.innerHTML = '<div style="text-align:center;color:var(--text-muted);font-size:12px;padding:20px 0">暂无翻译记录</div>';
        return;
    }
    container.innerHTML = quickHistory.map((h, i) => `
        <div class="history-item" onclick="copyText('${h.to.replace(/'/g, "\\'").replace(/\n/g, "\\n")}')">
            <div class="h-direction">${h.dir}</div>
            <div class="h-from">${escapeHtmlShort(h.from)}</div>
            <div class="h-to">${escapeHtmlShort(h.to)}</div>
        </div>
    `).join('');
}

function clearHistory() {
    quickHistory = [];
    localStorage.removeItem('vnzh_qt_history');
    renderHistory();
    showToast('翻译记录已清空');
}

// ==================== Render Messages ====================
function renderMessages() {
    const container = document.getElementById('chatMessages');

    if (messages.length === 0) {
        container.innerHTML = `
            <div class="empty-state">
                <i class="fas fa-language"></i>
                <h3>开始对话翻译</h3>
                <p>选择角色后输入内容，发送即可自动翻译<br>客户消息翻译为中文，你的回复翻译为越南语</p>
            </div>`;
        return;
    }

    container.innerHTML = messages.map(msg => {
        const roleClass = msg.role === 'customer' ? 'customer' : 'merchant';
        const avatarIcon = msg.role === 'customer' ? '<i class="fas fa-user"></i>' : '<i class="fas fa-store"></i>';
        const translationLabel = msg.role === 'customer' ? '中文翻译' : '越南语翻译';

        let translationHtml = '';
        if (msg.translation) {
            translationHtml = `
                <div class="msg-translation" onclick="copyText(this.dataset.text)" data-text="${escapeAttr(msg.translation)}">
                    <i class="fas fa-language"></i>
                    <span><strong>${translationLabel}：</strong>${escapeHtmlContent(msg.translation)}</span>
                    <i class="fas fa-copy" style="margin-left:auto;font-size:11px;color:#999"></i>
                </div>`;
        } else {
            translationHtml = `
                <div class="msg-translation" style="opacity:0.6">
                    <div class="typing-indicator"><span></span><span></span><span></span></div>
                </div>`;
        }

        return `
            <div class="message ${roleClass}">
                <div class="msg-avatar">${avatarIcon}</div>
                <div class="msg-content">
                    <div class="msg-bubble">${escapeHtmlContent(msg.text)}</div>
                    ${translationHtml}
                    <div class="msg-time">${msg.time}</div>
                </div>
            </div>`;
    }).join('');

    container.scrollTop = container.scrollHeight;
}

// ==================== Utilities ====================
function escapeHtmlContent(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML.replace(/\n/g, '<br>');
}

function escapeHtmlShort(text) {
    const div = document.createElement('div');
    div.textContent = text.length > 80 ? text.substring(0, 80) + '...' : text;
    return div.innerHTML;
}

function escapeAttr(text) {
    return text.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '&#10;');
}

function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function copyText(text) {
    navigator.clipboard.writeText(text).then(() => {
        showToast('已复制到剪贴板');
    }).catch(() => {
        const ta = document.createElement('textarea');
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        showToast('已复制到剪贴板');
    });
}

function showToast(text) {
    const toast = document.getElementById('toast');
    document.getElementById('toastText').textContent = text;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
}

function clearChat() {
    if (messages.length === 0) return;
    if (!confirm('确定要清空所有对话记录吗？')) return;
    messages = [];
    renderMessages();
    updateMsgCount();
    showToast('对话已清空');
}

function updateMsgCount() {
    document.getElementById('msgCount').textContent = `${messages.length} 条消息`;
}

// ==================== Settings ====================
function toggleSettings() {
    document.getElementById('settingsModal').classList.toggle('show');
}

function saveSettings() {
    config.provider = document.getElementById('aiProvider').value;
    config.apiKey = document.getElementById('apiKey').value.trim();
    config.baseUrl = document.getElementById('apiBase').value.trim() || 'https://api.openai.com/v1';
    config.model = document.getElementById('modelName').value.trim() || 'gpt-4o-mini';
    localStorage.setItem('vnzh_config', JSON.stringify(config));
    updateApiStatus();
    toggleSettings();
    showToast('设置已保存');
}

document.getElementById('settingsModal').addEventListener('click', function(e) {
    if (e.target === this) toggleSettings();
});

// ==================== Init ====================
init();
</script>

</body>
</html>
